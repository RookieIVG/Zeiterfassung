<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Userverwaltung</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="nav-bar">
        <a href="index.html" class="nav-link">➔ Zur Zeiterfassung</a>
        <span id="nav-user" style="font-size:0.85rem; color:#4a5568; font-weight:600;"></span>
        <button class="btn btn-small" id="btn-logout" style="display:none;">Abmelden</button>
        <button class="btn-darkmode" id="btn-darkmode" title="Dark/Light Mode">🌙</button>
    </div>

    <div class="main-layout">

        <!-- Linke Spalte: Formular -->
        <div class="form-panel">
            <h2>👤 User anlegen</h2>
            <form id="user-form">

                <div class="form-group">
                    <label for="anzeigename">Anzeigename:</label>
                    <input type="text" id="anzeigename" name="anzeigename" required placeholder="Vor- und Nachname">
                </div>
                <div class="form-group">
                    <label for="benutzername">Benutzername:</label>
                    <input type="text" id="benutzername" name="benutzername" required placeholder="z.B. mmax">
                </div>
                <div class="form-group">
                    <label for="email">E-Mail:</label>
                    <input type="email" id="email" name="email" placeholder="vorname.nachname@firma.at">
                </div>
                <div class="form-group">
                    <label for="passwort">Passwort:</label>
                    <div style="display:flex; gap:8px;">
                        <input type="text" id="passwort" name="passwort" placeholder="Leer lassen = nicht ändern" style="flex:1;">
                        <button type="button" class="btn btn-small" id="btn-gen-passwort" title="Passwort generieren">🔑 Generieren</button>
                    </div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="ist_admin" name="ist_admin">
                    <label for="ist_admin">Administrator</label>
                </div>
                <div class="checkbox-group">
                    <input type="checkbox" id="aktiv" name="aktiv" checked>
                    <label for="aktiv">Aktiv</label>
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-secondary" id="btn-abbrechen">Abbrechen</button>
<button type="submit" class="btn btn-primary" id="btn-submit">User speichern</button>
                </div>
            </form>
        </div>

        <!-- Rechte Spalte: Tabelle -->
        <div class="list-panel">
            <div class="list-container">
                <h2>👥 Vorhandene User</h2>
                <div class="table-responsive">
                    <table class="zeiterfassung-table">
                        <colgroup>
                            <col style="width: 150px;">
                            <col style="width: 120px;">
                            <col style="width: 190px;">
                            <col style="width: 65px;">
                            <col style="width: 60px;">
                            <col style="width: 110px;">
                            <col style="width: 100px;">
                        </colgroup>
                        <thead>
                            <tr>
                                <th>Anzeigename</th>
                                <th>Benutzername</th>
                                <th>E-Mail</th>
                                <th>Admin</th>
                                <th>Aktiv</th>
                                <th>Erstellt am</th>
                                <th>Aktionen</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {

        // Dark Mode
        const btnDark = document.getElementById('btn-darkmode');
        if (localStorage.getItem('darkmode') === '1') {
            document.body.classList.add('dark-mode');
            btnDark.textContent = '☀️';
        }
        btnDark.addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark-mode');
            btnDark.textContent = isDark ? '☀️' : '🌙';
            localStorage.setItem('darkmode', isDark ? '1' : '0');
        });

        // Session prüfen + Admin-Check
        fetch('api_auth.php?action=check')
            .then(res => res.json())
            .then(data => {
                if (data.status !== 'logged_in') {
                    window.location.href = 'login.html';
                } else if (!data.ist_admin) {
                    alert('Keine Berechtigung.');
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('nav-user').textContent = data.anzeigename;
                    document.getElementById('btn-logout').style.display = 'inline-block';
                }
            });

        document.getElementById('btn-logout').addEventListener('click', () => {
            fetch('api_auth.php?action=logout', { method: 'POST' })
                .then(() => window.location.href = 'login.html');
        });

        const form      = document.getElementById('user-form');
        const submitBtn = document.getElementById('btn-submit');
        let bearbeitungId = null;

        function ladeUsers() {
            fetch('api_users.php')
                .then(res => res.json())
                .then(users => {
                    const tbody = document.getElementById('users-table-body');
                    tbody.innerHTML = '';
                    users.forEach(u => {
                        const erstellt = new Date(u.erstellt_am).toLocaleDateString('de-DE');
                        tbody.insertAdjacentHTML('beforeend', `
                            <tr style="${!u.aktiv ? 'opacity:0.45;' : ''}">
                                <td><strong>${u.anzeigename}</strong></td>
                                <td>${u.benutzername}</td>
                                <td>${u.email || '-'}</td>
                                <td>${u.ist_admin ? '✅' : '-'}</td>
                                <td>${u.aktiv ? '✅' : '❌'}</td>
                                <td><small>${erstellt}</small></td>
                                <td>
                                    <button class="action-btn" title="Bearbeiten" onclick='bearbeiten(${JSON.stringify(u)})'>✏️</button>
                                    ${u.aktiv
                                        ? `<button class="action-btn" title="Deaktivieren" onclick="deaktivieren(${u.id})">🚫</button>`
                                        : `<button class="action-btn" title="Aktivieren" onclick="aktivieren(${u.id})">✔️</button>`
                                    }
                                    <button class="action-btn" title="Löschen" onclick="loeschen(${u.id})">❌</button>
                                </td>
                            </tr>
                        `);
                    });
                });
        }

        ladeUsers();

        // Formular absenden
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const data = {
                anzeigename:  document.getElementById('anzeigename').value,
                benutzername: document.getElementById('benutzername').value,
                passwort:     document.getElementById('passwort').value,
                email:        document.getElementById('email').value,
                ist_admin:    document.getElementById('ist_admin').checked,
                aktiv:        document.getElementById('aktiv').checked
            };

            const isEdit = bearbeitungId !== null;
            const url    = isEdit ? `api_users.php?id=${bearbeitungId}` : 'api_users.php';
            const method = isEdit ? 'PUT' : 'POST';

            fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(result => {
                if (result.status === 'success') {
                    // E-Mail automatisch senden wenn E-Mail und Passwort vorhanden
                    if (data.email && data.passwort) {
                        fetch('api_mail.php', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                anzeigename:  data.anzeigename,
                                benutzername: data.benutzername,
                                passwort:     data.passwort,
                                email:        data.email
                            })
                        })
                        .then(res => res.json())
                        .then(mailResult => {
                            if (mailResult.status !== 'success') alert('Fehler beim E-Mail senden: ' + mailResult.message);
                        });
                    }
                    form.reset();
                    document.getElementById('aktiv').checked = true;
                    bearbeitungId = null;
                    submitBtn.textContent = 'User speichern';
                    ladeUsers();
                }
            });
        });

        // Abbrechen
        document.getElementById('btn-abbrechen').addEventListener('click', () => {
            form.reset();
            document.getElementById('aktiv').checked = true;
            bearbeitungId = null;
            submitBtn.textContent = 'User speichern';

        });

        // ── Passwort generieren ──
        function generierePasswort() {
            const zeichen = 'abcdefghijkmnpqrstuvwxyzABCDEFGHJKLMNPQRSTUVWXYZ23456789!@#$%';
            let pw = '';
            for (let i = 0; i < 12; i++) {
                pw += zeichen[Math.floor(Math.random() * zeichen.length)];
            }
            return pw;
        }

        document.getElementById('btn-gen-passwort').addEventListener('click', () => {
            document.getElementById('passwort').value = generierePasswort();
        });



        // Bearbeiten
        window.bearbeiten = function(u) {
            bearbeitungId = u.id;
            document.getElementById('anzeigename').value  = u.anzeigename;
            document.getElementById('benutzername').value = u.benutzername;
            document.getElementById('email').value        = u.email || '';
            document.getElementById('passwort').value     = '';
            document.getElementById('ist_admin').checked  = u.ist_admin == 1;
            document.getElementById('aktiv').checked      = u.aktiv == 1;
            submitBtn.textContent = 'Änderung speichern';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Deaktivieren
        window.deaktivieren = function(id) {
            if (!confirm('User wirklich deaktivieren?')) return;
            fetch(`api_users.php?id=${id}`, { method: 'DELETE' })
                .then(res => res.json())
                .then(result => { if (result.status !== 'success') alert('Fehler: ' + result.message); ladeUsers(); });
        };

        // Aktivieren (über PUT mit aktiv=1)
        window.aktivieren = function(id) {
            fetch(`api_users.php?id=${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ aktiv: true })
            })
            .then(res => res.json())
            .then(result => { if (result.status !== 'success') alert('Fehler: ' + result.message); ladeUsers(); });
        };

        // Löschen
        window.loeschen = function(id) {
            if (!confirm('User wirklich löschen? Dies kann nicht rückgängig gemacht werden.')) return;
            fetch(`api_users.php?id=${id}&action=delete`, { method: 'DELETE' })
                .then(res => res.json())
                .then(result => { if (result.status !== 'success') alert('Fehler: ' + result.message); ladeUsers(); });
        };
    });
    </script>
</body>
</html>
