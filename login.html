<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeiterfassung – Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="icons.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 380px;
        }

        .login-box h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 1.5rem;
        }

        .login-error {
            background: #fff5f5;
            color: #c53030;
            border: 1px solid #fed7d7;
            border-radius: var(--radius);
            padding: 10px 14px;
            font-size: 0.88rem;
            margin-bottom: 16px;
            display: none;
        }

        body.dark-mode .login-error {
            background: #2d1515;
            color: #fc8181;
            border-color: #742a2a;
        }

        .btn-primary { width: 100%; margin-top: 8px; }

        .btn-darkmode-login {
            background-color: #e8f5ee;
            color: #007E36;
            border: 1px solid #c8ddd0;
        }
        .btn-darkmode-login:hover { background-color: #c8ddd0; }
        body.dark-mode .btn-darkmode-login {
            background-color: #2d3748;
            color: #e2e8f0;
            border-color: #4a5568;
        }
        body.dark-mode .btn-darkmode-login:hover { background-color: #4a5568; }
    </style>
</head>
<body>

    <div class="login-box">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px;">
            <h2 style="margin:0; border:none; padding:0;"><i data-lucide="timer" class="lucide-icon"></i> Zeiterfassung</h2>
            <button class="btn-darkmode btn-darkmode-login" id="btn-darkmode" title="Dark/Light Mode umschalten"><i data-lucide="moon" class="lucide-icon"></i></button>
        </div>

        <div class="login-error" id="login-error"></div>

        <form id="login-form">
            <div class="form-group">
                <label for="benutzername">Benutzername:</label>
                <input type="text" id="benutzername" name="benutzername" required autocomplete="username">
            </div>
            <div class="form-group">
                <label for="passwort">Passwort:</label>
                <input type="password" id="passwort" name="passwort" required autocomplete="current-password">
            </div>
            <div class="checkbox-group" style="margin-bottom: 12px;">
                <input type="checkbox" id="angemeldet-bleiben" name="angemeldet_bleiben">
                <label for="angemeldet-bleiben">Angemeldet bleiben</label>
            </div>
            <button type="submit" class="btn btn-primary">Anmelden</button>
        </form>
    </div>

    <script>
        // Dark Mode
        const btnDark = document.getElementById('btn-darkmode');
        if (localStorage.getItem('darkmode') === '1') {
            document.body.classList.add('dark-mode');
            btnDark.innerHTML = '<i data-lucide="sun" class="lucide-icon"></i>';
        }
        btnDark.addEventListener('click', () => {
            const isDark = document.body.classList.toggle('dark-mode');
            btnDark.innerHTML = isDark ? '<i data-lucide="sun" class="lucide-icon"></i>' : '<i data-lucide="moon" class="lucide-icon"></i>';
            localStorage.setItem('darkmode', isDark ? '1' : '0');
            refreshIcons();
        });

        refreshIcons();

        // Bereits eingeloggt?
        fetch('api_auth.php?action=check')
            .then(res => res.json())
            .then(data => {
                if (data.status === 'logged_in') window.location.href = 'index.html';
            });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const errorDiv = document.getElementById('login-error');
            errorDiv.style.display = 'none';

            const loginData = {
                benutzername:       document.getElementById('benutzername').value,
                passwort:           document.getElementById('passwort').value,
                angemeldet_bleiben: document.getElementById('angemeldet-bleiben').checked
            };

            fetch('api_auth.php?action=login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(loginData)
            })
            .then(res => res.json())
            .then(result => {
                if (result.status === 'success') {
                    window.location.href = 'index.html';
                } else {
                    errorDiv.textContent = result.message;
                    errorDiv.style.display = 'block';
                }
            });
        });
    </script>
</body>
</html>
